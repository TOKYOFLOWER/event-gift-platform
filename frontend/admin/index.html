  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f1f5f9; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.1); padding: 2.5rem; max-width: 420px; width: 100%; }

<body>

<div class="login-card">

  <div class="d-grid">

    繝ｭ繧ｰ繧､繝ｳ縺ｧ縺阪↑縺・ｴ蜷医・邂｡逅・・↓縺雁撫縺・粋繧上○縺上□縺輔＞縲・  </p>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script>
// GIS 繝医・繧ｯ繝ｳ繧ｯ繝ｩ繧､繧｢繝ｳ繝亥・譛溷喧
Auth.init({
  onLogin: async (userInfo, token) => {
    // Admin API 縺ｧ繝ｭ繝ｼ繝ｫ遒ｺ隱・    const { GasApi } = await import('../shared/js/api.js').catch(() => ({ GasApi: null }));
    // 繝ｭ繧ｰ繧､繝ｳ謌仙粥 竊・繝繝・す繝･繝懊・繝峨∈
    const redirect = store.get('admin_redirect') || 'dashboard.html';
    store.del('admin_redirect');
    location.href = redirect;
  },
  onLogout: () => {
    show('#loginBtn');
  }
});

// Google One Tap 繧ｳ繝ｼ繝ｫ繝舌ャ繧ｯ・井ｽｿ逕ｨ縺励↑縺・ｴ蜷医ｂ蠢ｵ縺ｮ縺溘ａ螳夂ｾｩ・・window.onGoogleLogin = (cred) => { Auth.login(); };

// client_id 繧・config 縺九ｉ險ｭ螳・document.addEventListener('DOMContentLoaded', () => {
  const cfg = window.GAS_CONFIG || {};
  if (cfg.googleClientId) {
    document.getElementById('g_id_onload').dataset.clientId = cfg.googleClientId;
  }
  // 譌｢縺ｫ繝ｭ繧ｰ繧､繝ｳ貂医∩縺ｪ繧峨Μ繝繧､繝ｬ繧ｯ繝・  if (Auth.isLoggedIn()) {
    const redirect = store.get('admin_redirect') || 'dashboard.html';
    store.del('admin_redirect');
    location.href = redirect;
  }
});
</script>
</body>
</html>
