<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蜃ｺ貍碑・ｮ｡逅・窶・縺ｯ縺ｪ縺溘・ Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div id="viewList">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-primary" onclick="showForm(null)">+ 蜃ｺ貍碑・匳骭ｲ</button>
    </div>
    <div id="listArea"><div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span></div></div>
  </div>

  <div id="viewForm" class="d-none">
    <div class="d-flex align-items-center gap-2 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showList()">竊・荳隕ｧ縺ｫ謌ｻ繧・/button>
      <h5 class="mb-0 fw-bold" id="formTitle">蜃ｺ貍碑・匳骭ｲ</h5>
    </div>
    <div id="formError" class="error-banner d-none mb-3"></div>

    <form id="performerForm" novalidate style="max-width:640px">
      <div class="form-section">
        <p class="form-section-title">蜃ｺ貍碑・ュ蝣ｱ</p>
        <div class="mb-3"><label class="form-label fw-semibold">陦ｨ遉ｺ蜷・<span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="displayName" required></div>
        <div class="mb-3"><label class="form-label">閧ｩ譖ｸ縺阪・繧ｰ繝ｫ繝ｼ繝怜錐</label>
          <input type="text" class="form-control" name="titleOrGroup" placeholder="繝輔Ν繝ｼ繝医き繝ｫ繝・ャ繝・闃ｱ"></div>
        <div class="mb-3"><label class="form-label">繝励Ο繝輔ぅ繝ｼ繝ｫ</label>
          <textarea class="form-control" name="bio" rows="5"></textarea></div>
        <div class="mb-3"><label class="form-label">繝励Ο繝輔ぅ繝ｼ繝ｫ逕ｻ蜒酋RL</label>
          <input type="url" class="form-control" name="avatarUrl" placeholder="https://...">
          <div id="avatarPreview" class="mt-2"></div></div>
        <div class="mb-3"><label class="form-label">SNS繝ｪ繝ｳ繧ｯ</label>
          <input type="url" class="form-control" name="snsUrl" placeholder="https://twitter.com/..."></div>
        <div id="activeToggle" class="d-none mb-3">
          <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" name="isActive" id="isActiveChk" checked>
            <label class="form-check-label" for="isActiveChk">譛牙柑</label>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="saveBtn">菫晏ｭ・/button>
        <button type="button" class="btn btn-outline-secondary" onclick="showList()">繧ｭ繝｣繝ｳ繧ｻ繝ｫ</button>
      </div>
    </form>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: '蜃ｺ貍碑・ｮ｡逅・, activeNav: 'performers' });

let api, currentId = null;

Auth.init({
  onLogin: (userInfo, token) => {
    setTopbarUser(userInfo);
    const cfg = getConfig();
    api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
    api.admin.setToken(token);
    loadList();
  },
  onLogout: () => { location.href = 'index.html'; }
});
if (!Auth.isLoggedIn()) location.href = 'index.html';

async function loadList() {
  showLoading('#listArea');
  try {
    const performers = await api.admin.listPerformers();
    setHtml('#listArea', renderTable({
      cols: [
        { label: '蜃ｺ貍碑・錐', key: 'displayName', render: r => `
          <div class="d-flex align-items-center gap-2">
            ${r.avatarUrl ? `<img src="${esc(r.avatarUrl)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">` : '<span style="font-size:1.5rem">痔</span>'}
            <span>${esc(r.displayName)}</span>
          </div>` },
        { label: '閧ｩ譖ｸ縺・, key: 'titleOrGroup' },
        { label: '迥ｶ諷・, key: 'isActive', render: r => r.isActive ? '<span class="badge bg-success">譛牙柑</span>' : '<span class="badge bg-secondary">辟｡蜉ｹ</span>' },
        { label: '', key: '_act', render: r => `
          <button class="btn btn-sm btn-outline-primary" onclick="showForm('${esc(r.performerId)}')">邱ｨ髮・/button>` }
      ],
      rows: performers,
      emptyMsg: '蜃ｺ貍碑・′逋ｻ骭ｲ縺輔ｌ縺ｦ縺・∪縺帙ｓ'
    }));
  } catch (e) { showError('#listArea', e.message); }
}

function showList() { hide('#viewForm'); show('#viewList'); currentId = null; loadList(); }

async function showForm(performerId) {
  currentId = performerId;
  hide('#viewList'); show('#viewForm');
  hide('#formError');
  document.getElementById('performerForm').reset();
  hide('#activeToggle');

  if (performerId) {
    setText('#formTitle', '蜃ｺ貍碑・ｷｨ髮・);
    show('#activeToggle');
    try {
      const p = await api.admin.getPerformer(performerId);
      const form = document.getElementById('performerForm');
      ['displayName','titleOrGroup','bio','avatarUrl','snsUrl'].forEach(k => {
        if (form.elements[k] && p[k] != null) form.elements[k].value = p[k];
      });
      document.getElementById('isActiveChk').checked = !!p.isActive;
      updateAvatarPreview(p.avatarUrl);
    } catch (e) { showError('#formError', e.message); }
  } else {
    setText('#formTitle', '蜃ｺ貍碑・匳骭ｲ');
  }
}

function updateAvatarPreview(url) {
  setHtml('#avatarPreview', url
    ? `<img src="${esc(url)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover">`
    : '');
}

$('[name=avatarUrl]')?.addEventListener('input', e => updateAvatarPreview(e.target.value));

document.getElementById('performerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '菫晏ｭ倅ｸｭ...';
  hide('#formError');

  const data = formToObj(e.target);
  try {
    if (currentId) {
      await api.admin.updatePerformer({ id: currentId, ...data });
    } else {
      await api.admin.createPerformer(data);
    }
    toast('菫晏ｭ倥＠縺ｾ縺励◆');
    showList();
  } catch (err) {
    showError('#formError', err.message);
  }
  btn.disabled = false; btn.textContent = '菫晏ｭ・;
});
</script>
</body>
</html>
