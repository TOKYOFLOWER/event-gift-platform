<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ユーザー管理 — はなたば Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div id="viewList">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-primary" onclick="showForm(null)">+ ユーザー追加</button>
    </div>
    <div id="listArea"><div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span></div></div>
  </div>

  <div id="viewForm" class="d-none">
    <div class="d-flex align-items-center gap-2 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showList()">← 一覧に戻る</button>
      <h5 class="mb-0 fw-bold" id="formTitle">ユーザー追加</h5>
    </div>
    <div id="formError" class="error-banner d-none mb-3"></div>

    <form id="userForm" novalidate style="max-width:560px">
      <div class="form-section">
        <p class="form-section-title">ユーザー情報</p>
        <div class="mb-3"><label class="form-label fw-semibold">表示名 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="displayName" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">メールアドレス（Google アカウント） <span class="text-danger">*</span></label>
          <input type="email" class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">ロール <span class="text-danger">*</span></label>
          <select class="form-select" name="role" id="roleSelect" required onchange="onRoleChange()">
            <option value="ORGANIZER">ORGANIZER（主催者）</option>
            <option value="PERFORMER">PERFORMER（出演者）</option>
            <option value="ADMIN">ADMIN（全権限）</option>
          </select></div>
        <div id="orgIdField" class="mb-3">
          <label class="form-label">主催者ID（ORGANIZER の場合）</label>
          <input type="text" class="form-control" name="organizerId" placeholder="ORG-xxx">
          <div class="form-text">空欄の場合は userId がそのまま使われます。</div>
        </div>
        <div id="perfIdField" class="mb-3 d-none">
          <label class="form-label">出演者ID（PERFORMER の場合）</label>
          <input type="text" class="form-control" name="performerId" placeholder="PERF-xxx"></div>
        <div id="activeSection" class="d-none">
          <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" name="isActive" id="isActiveChk" checked>
            <label class="form-check-label" for="isActiveChk">有効</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
        <button type="button" class="btn btn-outline-secondary" onclick="showList()">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: 'ユーザー管理', activeNav: 'users' });

let api, currentId = null;

Auth.init({
  onLogin: (userInfo, token) => {
    setTopbarUser(userInfo);
    const cfg = getConfig();
    api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
    api.admin.setToken(token);
    loadList();
  },
  onLogout: () => { location.href = 'index.html'; }
});
if (!Auth.isLoggedIn()) location.href = 'index.html';

function onRoleChange() {
  const role = document.getElementById('roleSelect').value;
  if (role === 'PERFORMER') { show('#perfIdField'); hide('#orgIdField'); }
  else if (role === 'ORGANIZER') { hide('#perfIdField'); show('#orgIdField'); }
  else { hide('#perfIdField'); hide('#orgIdField'); }
}

async function loadList() {
  showLoading('#listArea');
  try {
    const users = await api.admin.listUsers();
    setHtml('#listArea', renderTable({
      cols: [
        { label: '名前', key: 'displayName' },
        { label: 'メール', key: 'email' },
        { label: 'ロール', key: 'role', render: r => `<span class="badge bg-secondary">${esc(r.role)}</span>` },
        { label: '状態', key: 'isActive', render: r => r.isActive ? '<span class="badge bg-success">有効</span>' : '<span class="badge bg-danger">無効</span>' },
        { label: '', key: '_act', render: r => `
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" onclick="showForm('${esc(r.userId)}')">編集</button>
            ${r.isActive ? `<button class="btn btn-sm btn-outline-danger" onclick="deactivate('${esc(r.userId)}')">無効化</button>` : ''}
          </div>` }
      ],
      rows: users,
      emptyMsg: 'ユーザーがいません'
    }));
  } catch (e) { showError('#listArea', e.message); }
}

function showList() { hide('#viewForm'); show('#viewList'); currentId = null; loadList(); }

async function showForm(userId) {
  currentId = userId;
  hide('#viewList'); show('#viewForm');
  hide('#formError');
  document.getElementById('userForm').reset();
  hide('#activeSection');

  if (userId) {
    setText('#formTitle', 'ユーザー編集');
    show('#activeSection');
    try {
      const u = await api.admin.getUser(userId);
      const form = document.getElementById('userForm');
      ['displayName','email','role','organizerId','performerId'].forEach(k => {
        if (form.elements[k] && u[k] != null) form.elements[k].value = u[k];
      });
      document.getElementById('isActiveChk').checked = !!u.isActive;
      onRoleChange();
    } catch (e) { showError('#formError', e.message); }
  } else {
    setText('#formTitle', 'ユーザー追加');
    onRoleChange();
  }
}

async function deactivate(userId) {
  if (!confirm('このユーザーを無効化しますか？')) return;
  try {
    await api.admin.deactivateUser(userId);
    toast('無効化しました');
    loadList();
  } catch (e) { toast(e.message, 'danger'); }
}

document.getElementById('userForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  hide('#formError');

  const data = formToObj(e.target);
  try {
    if (currentId) await api.admin.updateUser({ id: currentId, ...data });
    else           await api.admin.createUser(data);
    toast('保存しました');
    showList();
  } catch (err) {
    showError('#formError', err.message);
  }
  btn.disabled = false; btn.textContent = '保存';
});
</script>
</body>
</html>
