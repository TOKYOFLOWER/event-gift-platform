<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>イベント管理 — はなたば Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <!-- イベント一覧 / フォームを動的に切り替え -->
  <div id="viewList">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div></div>
      <button class="btn btn-primary" onclick="showForm(null)">+ イベント作成</button>
    </div>
    <div id="eventTableArea"><div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span></div></div>
  </div>

  <!-- 編集フォーム（初期非表示） -->
  <div id="viewForm" class="d-none">
    <div class="d-flex align-items-center gap-2 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showList()">← 一覧に戻る</button>
      <h5 class="mb-0 fw-bold" id="formTitle">イベント作成</h5>
    </div>
    <div id="formError" class="error-banner d-none mb-3"></div>

    <form id="eventForm" novalidate>
      <div class="row g-3">
        <!-- 左カラム -->
        <div class="col-md-8">
          <div class="form-section">
            <p class="form-section-title">基本情報</p>
            <div class="mb-3"><label class="form-label fw-semibold">タイトル <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="title" required></div>
            <div class="row g-2">
              <div class="col-6"><label class="form-label">ジャンル</label>
                <input type="text" class="form-control" name="genre" placeholder="打楽器/マリンバ"></div>
              <div class="col-6"><label class="form-label">イベント種別</label>
                <input type="text" class="form-control" name="category" placeholder="ディナーショー"></div>
            </div>
            <div class="mt-3"><label class="form-label">説明文</label>
              <textarea class="form-control" name="description" rows="4"></textarea></div>
            <div class="mt-3"><label class="form-label">備考・特記事項</label>
              <textarea class="form-control" name="eventNotes" rows="3"></textarea></div>
            <div class="mt-3"><label class="form-label">お問い合わせ先（公開）</label>
              <input type="text" class="form-control" name="contactInfo"></div>
            <div class="mt-3"><label class="form-label">差し入れ受付締切日時</label>
              <input type="datetime-local" class="form-control" name="giftDeadlineAt"></div>
          </div>

          <!-- セッション（編集時のみ） -->
          <div id="sessionsSection" class="d-none">
            <div class="form-section">
              <p class="form-section-title">公演回（セッション）</p>
              <div id="sessionList" class="mb-3"></div>
              <div class="border rounded p-3 bg-light">
                <p class="small fw-bold mb-2">セッションを追加</p>
                <div class="row g-2 mb-2">
                  <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="newSessionLabel" placeholder="表示名（例: 第1部）"></div>
                  <div class="col-md-4"><input type="datetime-local" class="form-control form-control-sm" id="newSessionStart"></div>
                  <div class="col-md-4"><input type="datetime-local" class="form-control form-control-sm" id="newSessionEnd"></div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addSession()">追加</button>
              </div>
            </div>
          </div>

          <!-- 券種（編集時のみ） -->
          <div id="ticketsSection" class="d-none">
            <div class="form-section">
              <p class="form-section-title">券種</p>
              <div id="ticketList" class="mb-3"></div>
              <div class="border rounded p-3 bg-light">
                <p class="small fw-bold mb-2">券種を追加</p>
                <div class="row g-2 mb-2">
                  <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="newTicketLabel" placeholder="券種名（例: 一般）"></div>
                  <div class="col-md-4"><input type="number" class="form-control form-control-sm" id="newTicketPrice" placeholder="価格（円）" min="0"></div>
                  <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="newTicketDesc" placeholder="含まれるもの"></div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="addTicket()">追加</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 右カラム -->
        <div class="col-md-4">
          <div class="form-section">
            <p class="form-section-title">会場情報</p>
            <div class="mb-2"><label class="form-label">会場名 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="venueName" required></div>
            <div class="mb-2"><label class="form-label">都道府県</label>
              <input type="text" class="form-control" name="venuePref" placeholder="東京都"></div>
            <div class="mb-2"><label class="form-label">市区町村</label>
              <input type="text" class="form-control" name="venueCity"></div>
            <div class="mb-2"><label class="form-label">番地以降</label>
              <input type="text" class="form-control" name="venueAddress"></div>
            <div class="mb-2"><label class="form-label">郵便番号</label>
              <input type="text" class="form-control" name="venuePostalCode" placeholder="100-0001"></div>
            <div class="mb-2"><label class="form-label">アクセス情報</label>
              <input type="text" class="form-control" name="venueAccess"></div>
          </div>
          <div class="form-section">
            <p class="form-section-title">画像・リンク</p>
            <div class="mb-2"><label class="form-label">カバー画像URL</label>
              <input type="url" class="form-control" name="coverImageUrl"></div>
            <div class="mb-2"><label class="form-label">フライヤー画像URL</label>
              <input type="url" class="form-control" name="flyerImageUrl"></div>
            <div class="mb-2"><label class="form-label">チケット販売URL</label>
              <input type="url" class="form-control" name="ticketUrl"></div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
        <button type="button" class="btn btn-outline-secondary" onclick="showList()">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<!-- 出演者割り当てモーダル -->
<div class="modal fade" id="performerModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">出演者割り当て</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="performerModalBody"></div>
  </div></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: 'イベント管理', activeNav: 'events' });

let api, currentEventId = null;

Auth.init({
  onLogin: (userInfo, token) => {
    setTopbarUser(userInfo);
    const cfg = getConfig();
    api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
    api.admin.setToken(token);
    loadEventList();
    // URL から編集対象を取得
    const editId = qs.get('edit');
    if (editId) showForm(editId);
  },
  onLogout: () => { location.href = 'index.html'; }
});
if (!Auth.isLoggedIn()) location.href = 'index.html';

// ── 一覧 ───────────────────────────────────────────

async function loadEventList() {
  showLoading('#eventTableArea');
  try {
    const events = await api.admin.listEvents();
    setHtml('#eventTableArea', renderTable({
      cols: [
        { key: 'title',   label: 'タイトル' },
        { key: 'status',  label: '状態', render: r => statusBadge(r.status) },
        { key: 'venueName', label: '会場' },
        { key: 'giftDeadlineAt', label: '締切', render: r => fmtDate(r.giftDeadlineAt) },
        { key: '_act', label: '操作', render: r => `
          <div class="d-flex gap-1 flex-wrap">
            <button class="btn btn-sm btn-outline-primary" onclick="showForm('${esc(r.eventId)}')">編集</button>
            ${r.status === 'DRAFT'      ? `<button class="btn btn-sm btn-success"  onclick="changeStatus('${esc(r.eventId)}','publish')">公開</button>` : ''}
            ${r.status === 'PUBLISHED'  ? `<button class="btn btn-sm btn-warning"  onclick="changeStatus('${esc(r.eventId)}','close')">終了</button>` : ''}
            <a href="orders.html?eventId=${esc(r.eventId)}" class="btn btn-sm btn-outline-secondary">注文</a>
          </div>` }
      ],
      rows: events,
      emptyMsg: 'イベントがありません。「+ イベント作成」から追加してください。'
    }));
  } catch (e) { showError('#eventTableArea', e.message); }
}

async function changeStatus(eventId, action) {
  try {
    if (action === 'publish') await api.admin.publishEvent(eventId);
    else                      await api.admin.closeEvent(eventId);
    toast(action === 'publish' ? '公開しました' : '終了しました');
    loadEventList();
  } catch (e) { toast(e.message, 'danger'); }
}

// ── フォーム ────────────────────────────────────────

function showList() {
  hide('#viewForm'); show('#viewList');
  currentEventId = null;
  loadEventList();
}

async function showForm(eventId) {
  currentEventId = eventId;
  hide('#viewList'); show('#viewForm');
  hide('#formError');

  const form = document.getElementById('eventForm');
  form.reset();

  if (eventId) {
    setText('#formTitle', 'イベント編集');
    showLoading('#formError');
    try {
      const { event: ev, sessions, ticketTypes } = await api.admin.getEvent(eventId);
      hide('#formError');
      // フォームに値を設定
      Object.entries(ev).forEach(([k, v]) => {
        const el = form.elements[k];
        if (el && v != null) {
          if (el.type === 'datetime-local') {
            // ISO → datetime-local 形式に変換
            el.value = v ? v.slice(0, 16) : '';
          } else {
            el.value = v;
          }
        }
      });
      show('#sessionsSection');
      show('#ticketsSection');
      renderSessionList(sessions);
      renderTicketList(ticketTypes);
    } catch (e) { showError('#formError', e.message); }
  } else {
    setText('#formTitle', 'イベント作成');
    hide('#sessionsSection');
    hide('#ticketsSection');
  }
}

// フォーム送信
document.getElementById('eventForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  hide('#formError');

  const data = formToObj(e.target);
  try {
    if (currentEventId) {
      await api.admin.updateEvent({ id: currentEventId, ...data });
      toast('保存しました');
    } else {
      const ev = await api.admin.createEvent(data);
      toast('作成しました');
      currentEventId = ev.eventId;
      await showForm(ev.eventId);
    }
  } catch (err) {
    showError('#formError', err.message);
  }
  btn.disabled = false; btn.textContent = '保存';
});

// ── セッション管理 ─────────────────────────────────

function renderSessionList(sessions) {
  if (!sessions.length) {
    setHtml('#sessionList', '<p class="text-muted small">セッションがありません</p>');
    return;
  }
  setHtml('#sessionList', `<table class="table table-sm mb-0">
    <thead><tr><th>ラベル</th><th>開始</th><th>終了</th><th></th></tr></thead>
    <tbody>
      ${sessions.map(s => `<tr>
        <td>${esc(s.sessionLabel)}</td>
        <td>${fmtDateTime(s.startAt)}</td>
        <td>${fmtDateTime(s.endAt)}</td>
        <td><button class="btn btn-sm btn-outline-danger" onclick="deleteSession('${esc(s.sessionId)}')">削除</button></td>
      </tr>`).join('')}
    </tbody></table>`);
}

async function addSession() {
  const label = document.getElementById('newSessionLabel').value.trim();
  const start = document.getElementById('newSessionStart').value;
  const end   = document.getElementById('newSessionEnd').value;
  if (!label || !start) { toast('表示名と開始時刻は必須です', 'warning'); return; }
  try {
    await api.admin.createSession({ eventId: currentEventId, sessionLabel: label, startAt: start, endAt: end || undefined });
    toast('追加しました');
    const { sessions } = await api.admin.getEvent(currentEventId);
    renderSessionList(sessions);
    document.getElementById('newSessionLabel').value = '';
    document.getElementById('newSessionStart').value = '';
    document.getElementById('newSessionEnd').value = '';
  } catch (e) { toast(e.message, 'danger'); }
}

async function deleteSession(sessionId) {
  if (!confirm('このセッションを削除しますか？')) return;
  try {
    await api.admin.deleteSession({ eventId: currentEventId, sessionId });
    toast('削除しました');
    const { sessions } = await api.admin.getEvent(currentEventId);
    renderSessionList(sessions);
  } catch (e) { toast(e.message, 'danger'); }
}

// ── 券種管理 ───────────────────────────────────────

function renderTicketList(ticketTypes) {
  if (!ticketTypes.length) {
    setHtml('#ticketList', '<p class="text-muted small">券種がありません</p>');
    return;
  }
  setHtml('#ticketList', `<table class="table table-sm mb-0">
    <thead><tr><th>券種名</th><th>価格</th><th>説明</th><th></th></tr></thead>
    <tbody>
      ${ticketTypes.map(t => `<tr>
        <td>${esc(t.label)}</td>
        <td>${fmtJPY(t.priceJPY)}</td>
        <td>${esc(t.description)}</td>
        <td><button class="btn btn-sm btn-outline-danger" onclick="deleteTicket('${esc(t.ticketTypeId)}')">削除</button></td>
      </tr>`).join('')}
    </tbody></table>`);
}

async function addTicket() {
  const label = document.getElementById('newTicketLabel').value.trim();
  const price = document.getElementById('newTicketPrice').value;
  const desc  = document.getElementById('newTicketDesc').value;
  if (!label || price === '') { toast('券種名と価格は必須です', 'warning'); return; }
  try {
    await api.admin.createTicketType({ eventId: currentEventId, label, priceJPY: Number(price), description: desc });
    toast('追加しました');
    const { ticketTypes } = await api.admin.getEvent(currentEventId);
    renderTicketList(ticketTypes);
    document.getElementById('newTicketLabel').value = '';
    document.getElementById('newTicketPrice').value = '';
    document.getElementById('newTicketDesc').value  = '';
  } catch (e) { toast(e.message, 'danger'); }
}

async function deleteTicket(ticketTypeId) {
  if (!confirm('この券種を削除しますか？')) return;
  try {
    await api.admin.deleteTicketType({ eventId: currentEventId, ticketTypeId });
    toast('削除しました');
    const { ticketTypes } = await api.admin.getEvent(currentEventId);
    renderTicketList(ticketTypes);
  } catch (e) { toast(e.message, 'danger'); }
}
</script>
</body>
</html>
