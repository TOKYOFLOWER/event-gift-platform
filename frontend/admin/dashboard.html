<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>繝繝・す繝･繝懊・繝・窶・縺ｯ縺ｪ縺溘・ Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div id="statsRow" class="row g-3 mb-4">
    <div class="col-12 loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span>隱ｭ縺ｿ霎ｼ縺ｿ荳ｭ...</div>
  </div>
  <div id="recentEvents"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: '繝繝・す繝･繝懊・繝・, activeNav: 'dashboard' });

Auth.init({
  onLogin: async (userInfo, token) => {
    setTopbarUser(userInfo);
    loadDashboard(token);
  },
  onLogout: () => { location.href = 'index.html'; }
});

if (!Auth.isLoggedIn()) location.href = 'index.html';

async function loadDashboard(token) {
  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
  api.admin.setToken(token || Auth.getToken());

  try {
    const data = await api.admin.getDashboard();
    const { stats, recentEvents } = data;

    // 邨ｱ險医き繝ｼ繝・    const statCards = [
      { label: '蜈ｬ髢倶ｸｭ繧､繝吶Φ繝・, value: stats.publishedEvents, color: 'success', link: 'events.html' },
      { label: '遒ｺ螳壽ｸ医∩豕ｨ譁・,   value: stats.paidOrders,     color: 'primary', link: 'orders.html' },
      { label: '菫晉蕗荳ｭ豕ｨ譁・,     value: stats.pendingOrders,  color: 'warning', link: 'orders.html?paymentStatus=PENDING' },
      { label: '邏ｯ險亥｣ｲ荳・,       value: fmtJPY(stats.totalSalesJPY), color: 'info', link: 'orders.html' },
    ];

    setHtml('#statsRow', statCards.map(c => `
      <div class="col-6 col-md-3">
        <a href="${esc(c.link)}" class="text-decoration-none">
          <div class="card stat-card p-3 h-100">
            <div class="stat-value text-${esc(c.color)}">${c.value}</div>
            <div class="stat-label">${esc(c.label)}</div>
          </div>
        </a>
      </div>`).join(''));

    // 譛霑代・繧､繝吶Φ繝・    setHtml('#recentEvents', `
      <h5 class="fw-bold mb-3">譛霑代・繧､繝吶Φ繝・/h5>
      ${renderTable({
        cols: [
          { key: 'title',         label: '繧ｿ繧､繝医Ν' },
          { key: 'status',        label: '迥ｶ諷・, render: r => statusBadge(r.status) },
          { key: 'venueName',     label: '莨壼ｴ' },
          { key: 'giftDeadlineAt',label: '邱蛻・, render: r => fmtDate(r.giftDeadlineAt) },
          { key: '_actions',      label: '', render: r =>
            `<a href="events.html?edit=${esc(r.eventId)}" class="btn btn-sm btn-outline-primary">邱ｨ髮・/a>` }
        ],
        rows: recentEvents,
        emptyMsg: '繧､繝吶Φ繝医′縺ゅｊ縺ｾ縺帙ｓ'
      })}`);
  } catch (e) {
    showError('#statsRow', e.message);
  }
}
</script>
</body>
</html>
