<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ダッシュボード — はなたば Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div id="statsRow" class="row g-3 mb-4">
    <div class="col-12 loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span>読み込み中...</div>
  </div>
  <div id="recentEvents"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: 'ダッシュボード', activeNav: 'dashboard' });

Auth.init({
  onLogin: async (userInfo, token) => {
    setTopbarUser(userInfo);
    loadDashboard(token);
  },
  onLogout: () => { location.href = 'index.html'; }
});

if (!Auth.isLoggedIn()) location.href = 'index.html';

async function loadDashboard(token) {
  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
  api.admin.setToken(token || Auth.getToken());

  try {
    const data = await api.admin.getDashboard();
    const { stats, recentEvents } = data;

    // 統計カード
    const statCards = [
      { label: '公開中イベント', value: stats.publishedEvents, color: 'success', link: 'events.html' },
      { label: '確定済み注文',   value: stats.paidOrders,     color: 'primary', link: 'orders.html' },
      { label: '保留中注文',     value: stats.pendingOrders,  color: 'warning', link: 'orders.html?paymentStatus=PENDING' },
      { label: '累計売上',       value: fmtJPY(stats.totalSalesJPY), color: 'info', link: 'orders.html' },
    ];

    setHtml('#statsRow', statCards.map(c => `
      <div class="col-6 col-md-3">
        <a href="${esc(c.link)}" class="text-decoration-none">
          <div class="card stat-card p-3 h-100">
            <div class="stat-value text-${esc(c.color)}">${c.value}</div>
            <div class="stat-label">${esc(c.label)}</div>
          </div>
        </a>
      </div>`).join(''));

    // 最近のイベント
    setHtml('#recentEvents', `
      <h5 class="fw-bold mb-3">最近のイベント</h5>
      ${renderTable({
        cols: [
          { key: 'title',         label: 'タイトル' },
          { key: 'status',        label: '状態', render: r => statusBadge(r.status) },
          { key: 'venueName',     label: '会場' },
          { key: 'giftDeadlineAt',label: '締切', render: r => fmtDate(r.giftDeadlineAt) },
          { key: '_actions',      label: '', render: r =>
            `<a href="events.html?edit=${esc(r.eventId)}" class="btn btn-sm btn-outline-primary">編集</a>` }
        ],
        rows: recentEvents,
        emptyMsg: 'イベントがありません'
      })}`);
  } catch (e) {
    showError('#statsRow', e.message);
  }
}
</script>
</body>
</html>
