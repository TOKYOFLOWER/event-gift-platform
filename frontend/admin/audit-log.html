<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>監査ログ — はなたば Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <p class="text-muted small mb-0">最新 200 件を表示</p>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadLogs()">🔄 更新</button>
  </div>
  <div id="listArea"><div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span></div></div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: '監査ログ', activeNav: 'audit-log' });

let api;

Auth.init({
  onLogin: (userInfo, token) => {
    setTopbarUser(userInfo);
    const cfg = getConfig();
    api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
    api.admin.setToken(token);
    loadLogs();
  },
  onLogout: () => { location.href = 'index.html'; }
});
if (!Auth.isLoggedIn()) location.href = 'index.html';

async function loadLogs() {
  showLoading('#listArea');
  try {
    const logs = await api.admin.listAuditLogs(200);
    setHtml('#listArea', renderTable({
      cols: [
        { label: '日時', key: 'createdAt', render: r => `<span class="small">${fmtDateTime(r.createdAt)}</span>` },
        { label: '操作者', key: 'actorEmail', render: r => `<span class="small">${esc(r.actorEmail)}</span>` },
        { label: '操作', key: 'action', render: r => `<code class="small">${esc(r.action)}</code>` },
        { label: '対象種別', key: 'entityType' },
        { label: '対象ID', key: 'entityId', render: r => `<span class="font-monospace small">${esc(r.entityId)}</span>` },
      ],
      rows: logs,
      emptyMsg: 'ログがありません'
    }));
  } catch (e) { showError('#listArea', e.message); }
}
</script>
</body>
</html>
