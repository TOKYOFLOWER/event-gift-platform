<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品管理 — はなたば Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>
<div id="pageContent">
  <div id="viewList">
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-primary" onclick="showForm(null)">+ 商品追加</button>
    </div>
    <div id="listArea"><div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span></div></div>
  </div>

  <div id="viewForm" class="d-none">
    <div class="d-flex align-items-center gap-2 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showList()">← 一覧に戻る</button>
      <h5 class="mb-0 fw-bold" id="formTitle">商品追加</h5>
    </div>
    <div id="formError" class="error-banner d-none mb-3"></div>

    <form id="productForm" novalidate style="max-width:600px">
      <div class="form-section">
        <p class="form-section-title">商品情報</p>
        <div class="mb-3"><label class="form-label fw-semibold">商品名 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="name" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">カテゴリ <span class="text-danger">*</span></label>
          <select class="form-select" name="category" required>
            <option value="FLOWER">🌸 フラワー</option>
            <option value="ALCOHOL">🍶 お酒</option>
          </select></div>
        <div class="mb-3"><label class="form-label fw-semibold">税込価格（円） <span class="text-danger">*</span></label>
          <input type="number" class="form-control" name="priceJPY" min="0" required></div>
        <div class="mb-3"><label class="form-label">説明文</label>
          <textarea class="form-control" name="description" rows="3"></textarea></div>
        <div class="mb-3"><label class="form-label">商品画像URL</label>
          <input type="url" class="form-control" name="imageUrl" placeholder="https://...">
          <div id="imgPreview" class="mt-2"></div></div>
        <div class="mb-3"><label class="form-label">表示順</label>
          <input type="number" class="form-control" name="sortOrder" min="1" value="1" style="width:120px"></div>
        <div id="activeSection" class="d-none">
          <div class="form-check form-switch">
            <input type="checkbox" class="form-check-input" name="isActive" id="isActiveChk" checked>
            <label class="form-check-label" for="isActiveChk">販売中（公開）</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
        <button type="button" class="btn btn-outline-secondary" onclick="showList()">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/auth.js"></script>
<script src="../shared/js/api.js"></script>
<script src="../shared/js/admin-layout.js"></script>
<script>
initAdminLayout({ pageTitle: '商品管理', activeNav: 'products' });

let api, currentId = null;

Auth.init({
  onLogin: (userInfo, token) => {
    setTopbarUser(userInfo);
    const cfg = getConfig();
    api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });
    api.admin.setToken(token);
    loadList();
  },
  onLogout: () => { location.href = 'index.html'; }
});
if (!Auth.isLoggedIn()) location.href = 'index.html';

async function loadList() {
  showLoading('#listArea');
  try {
    const products = await api.admin.listProducts();
    setHtml('#listArea', renderTable({
      cols: [
        { label: '商品名', key: 'name', render: r => `
          <div class="d-flex align-items-center gap-2">
            ${r.imageUrl ? `<img src="${esc(r.imageUrl)}" style="width:40px;height:40px;object-fit:cover;border-radius:6px">` : '<span style="font-size:1.5rem">🌸</span>'}
            <span>${esc(r.name)}</span>
          </div>` },
        { label: 'カテゴリ', key: 'category', render: r => `<span class="badge ${r.category === 'FLOWER' ? 'bg-success' : 'bg-warning text-dark'}">${esc(r.category)}</span>` },
        { label: '価格', key: 'priceJPY', render: r => fmtJPY(r.priceJPY) },
        { label: '順序', key: 'sortOrder' },
        { label: '状態', key: 'isActive', render: r => r.isActive ? '<span class="badge bg-success">販売中</span>' : '<span class="badge bg-secondary">非表示</span>' },
        { label: '', key: '_act', render: r => `
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" onclick="showForm('${esc(r.productId)}')">編集</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="toggleProduct('${esc(r.productId)}', ${!r.isActive})">${r.isActive ? '非表示' : '表示'}</button>
          </div>` }
      ],
      rows: products,
      emptyMsg: '商品が登録されていません'
    }));
  } catch (e) { showError('#listArea', e.message); }
}

async function toggleProduct(productId, isActive) {
  try {
    await api.admin.toggleProduct(productId, isActive);
    toast(isActive ? '販売中にしました' : '非表示にしました');
    loadList();
  } catch (e) { toast(e.message, 'danger'); }
}

function showList() { hide('#viewForm'); show('#viewList'); currentId = null; loadList(); }

async function showForm(productId) {
  currentId = productId;
  hide('#viewList'); show('#viewForm');
  hide('#formError');
  document.getElementById('productForm').reset();

  if (productId) {
    setText('#formTitle', '商品編集');
    show('#activeSection');
    try {
      const p = await api.admin.getProduct(productId);
      const form = document.getElementById('productForm');
      ['name','category','description','imageUrl','sortOrder'].forEach(k => {
        if (form.elements[k] && p[k] != null) form.elements[k].value = p[k];
      });
      form.elements.priceJPY.value = p.priceJPY;
      document.getElementById('isActiveChk').checked = !!p.isActive;
      updateImgPreview(p.imageUrl);
    } catch (e) { showError('#formError', e.message); }
  } else {
    setText('#formTitle', '商品追加');
    hide('#activeSection');
  }
}

function updateImgPreview(url) {
  setHtml('#imgPreview', url
    ? `<img src="${esc(url)}" style="width:80px;height:80px;object-fit:cover;border-radius:8px">`
    : '');
}

$('[name=imageUrl]')?.addEventListener('input', e => updateImgPreview(e.target.value));

document.getElementById('productForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  hide('#formError');

  const data = formToObj(e.target);
  try {
    if (currentId) await api.admin.updateProduct({ id: currentId, ...data });
    else           await api.admin.createProduct(data);
    toast('保存しました');
    showList();
  } catch (err) {
    showError('#formError', err.message);
  }
  btn.disabled = false; btn.textContent = '保存';
});
</script>
</body>
</html>
