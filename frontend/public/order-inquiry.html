<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>豕ｨ譁・・莨・窶・縺ｯ縺ｪ縺溘・</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>

<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">減 縺ｯ縺ｪ縺溘・</a>
  </div>
</nav>

<main class="container py-5" style="max-width:540px;margin:auto">
  <h2 class="fw-bold">逃 豕ｨ譁・・莨・/h2>
  <p class="text-muted mb-4">豕ｨ譁・凾縺ｫ蜈･蜉帙＠縺溘Γ繝ｼ繝ｫ繧｢繝峨Ξ繧ｹ縺ｨ豕ｨ譁・分蜿ｷ繧貞・蜉帙＠縺ｦ縺上□縺輔＞縲・/p>

  <div class="form-section">
    <form id="inquiryForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">繝｡繝ｼ繝ｫ繧｢繝峨Ξ繧ｹ <span class="text-danger">*</span></label>
        <input type="email" class="form-control" name="email" id="emailInput" required placeholder="example@email.com">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">豕ｨ譁・分蜿ｷ <span class="text-danger">*</span></label>
        <input type="text" class="form-control font-monospace" name="gmoOrderId" id="orderIdInput" required placeholder="ORD-xxxxxxxx">
        <div class="form-text text-muted">豕ｨ譁・｢ｺ隱阪Γ繝ｼ繝ｫ縺ｫ險倩ｼ峨＆繧後※縺・∪縺吶・/div>
      </div>
      <div id="formError" class="error-banner d-none mb-3"></div>
      <button type="submit" id="submitBtn" class="btn-gift px-4 py-2">辣ｧ莨壹☆繧・/button>
    </form>
  </div>

  <!-- 邨先棡 -->
  <div id="resultArea" class="d-none">
    <div class="card p-4 mt-4">
      <h5 class="fw-bold">豕ｨ譁・ュ蝣ｱ</h5>
      <table class="table table-sm mb-0">
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer class="border-top py-4 mt-5">
  <div class="container text-center text-muted small">&copy; 2026 縺ｯ縺ｪ縺溘・.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(() => {
  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  // URL 繝代Λ繝｡繝ｼ繧ｿ縺ｧ莠句燕蜈･蜉・  const preGmoOrderId = qs.get('gmoOrderId');
  const preEmail      = qs.get('email');
  if (preGmoOrderId) document.getElementById('orderIdInput').value = preGmoOrderId;
  if (preEmail)      document.getElementById('emailInput').value   = preEmail;

  // 莠句燕蜈･蜉帙′縺ゅｌ縺ｰ閾ｪ蜍暮∽ｿ｡
  if (preGmoOrderId && preEmail) {
    document.getElementById('inquiryForm').dispatchEvent(new Event('submit'));
  }

  document.getElementById('inquiryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '辣ｧ莨壻ｸｭ...';
    hide('#resultArea');
    hide('#formError');

    const email      = document.getElementById('emailInput').value.trim();
    const gmoOrderId = document.getElementById('orderIdInput').value.trim();

    if (!email || !gmoOrderId) {
      setHtml('#formError', '繝｡繝ｼ繝ｫ繧｢繝峨Ξ繧ｹ縺ｨ豕ｨ譁・分蜿ｷ繧貞・蜉帙＠縺ｦ縺上□縺輔＞縲・);
      show('#formError');
      btn.disabled = false; btn.textContent = '辣ｧ莨壹☆繧・;
      return;
    }

    try {
      const order = await api.public.inquireOrder(gmoOrderId, email);

      const rows = [
        ['豕ｨ譁・分蜿ｷ',    `<span class="font-monospace">${esc(order.gmoOrderId)}</span>`],
        ['豎ｺ貂育憾豕・,    statusBadge(order.paymentStatus)],
        ['縺雁ｱ翫￠迥ｶ豕・,  statusBadge(order.fulfillmentStatus)],
        ['蝠・刀',        esc(order.productName)],
        ['驥鷹｡・,        fmtJPY(order.totalJPY)],
        ['繧､繝吶Φ繝・,    esc(order.eventTitle)],
        ['螳帛・',        esc(order.performerName)],
        ['豕ｨ譁・律譎・,    fmtDateTime(order.createdAt)],
        ['豎ｺ貂亥ｮ御ｺ・律譎・, order.paidAt ? fmtDateTime(order.paidAt) : '窶・],
      ];

      setHtml('#resultBody', rows.map(([k, v]) =>
        `<tr><th class="text-muted fw-normal" style="width:40%">${esc(k)}</th><td>${v}</td></tr>`
      ).join(''));
      show('#resultArea');
    } catch (err) {
      if (err.code === 'NOT_FOUND') {
        setHtml('#formError', '豕ｨ譁・′隕九▽縺九ｊ縺ｾ縺帙ｓ縺ｧ縺励◆縲ゅΓ繝ｼ繝ｫ繧｢繝峨Ξ繧ｹ縺ｨ豕ｨ譁・分蜿ｷ繧偵＃遒ｺ隱阪￥縺縺輔＞縲・);
      } else {
        setHtml('#formError', esc(err.message));
      }
      show('#formError');
    }

    btn.disabled = false;
    btn.textContent = '辣ｧ莨壹☆繧・;
  });
})();
</script>
</body>
</html>
