<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注文照会 — はなたば</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>

<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">🌸 はなたば</a>
    <span class="text-white small">注文照会</span>
  </div>
</nav>

<main class="container py-5" style="max-width:540px;margin:auto">
  <h2 class="fw-bold">📦 注文照会</h2>
  <p class="text-muted mb-4">注文時に入力したメールアドレスと注文番号を入力してください。</p>

  <div class="form-section">
    <form id="inquiryForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">メールアドレス <span class="text-danger">*</span></label>
        <input type="email" class="form-control" name="email" id="emailInput" required placeholder="example@email.com">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">注文番号 <span class="text-danger">*</span></label>
        <input type="text" class="form-control font-monospace" name="gmoOrderId" id="orderIdInput" required placeholder="ORD-xxxxxxxx">
        <div class="form-text text-muted">注文確認メールに記載されています。</div>
      </div>
      <div id="formError" class="error-banner d-none mb-3"></div>
      <button type="submit" id="submitBtn" class="btn-gift px-4 py-2">照会する</button>
    </form>
  </div>

  <!-- 結果 -->
  <div id="resultArea" class="d-none">
    <div class="card p-4 mt-4">
      <h5 class="fw-bold">注文情報</h5>
      <table class="table table-sm mb-0">
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer class="border-top py-4 mt-5">
  <div class="container text-center text-muted small">&copy; 2026 はなたば.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(() => {
  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  // URL パラメータで事前入力
  const preGmoOrderId = qs.get('gmoOrderId');
  const preEmail      = qs.get('email');
  if (preGmoOrderId) document.getElementById('orderIdInput').value = preGmoOrderId;
  if (preEmail)      document.getElementById('emailInput').value   = preEmail;

  // 事前入力があれば自動送信
  if (preGmoOrderId && preEmail) {
    document.getElementById('inquiryForm').dispatchEvent(new Event('submit'));
  }

  document.getElementById('inquiryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '照会中...';
    hide('#resultArea');
    hide('#formError');

    const email      = document.getElementById('emailInput').value.trim();
    const gmoOrderId = document.getElementById('orderIdInput').value.trim();

    if (!email || !gmoOrderId) {
      setHtml('#formError', 'メールアドレスと注文番号を入力してください。');
      show('#formError');
      btn.disabled = false; btn.textContent = '照会する';
      return;
    }

    try {
      const order = await api.public.inquireOrder(gmoOrderId, email);

      const rows = [
        ['注文番号',    `<span class="font-monospace">${esc(order.gmoOrderId)}</span>`],
        ['決済状況',    statusBadge(order.paymentStatus)],
        ['お届け状況',  statusBadge(order.fulfillmentStatus)],
        ['商品',        esc(order.productName)],
        ['金額',        fmtJPY(order.totalJPY)],
        ['イベント',    esc(order.eventTitle)],
        ['宛先',        esc(order.performerName)],
        ['注文日時',    fmtDateTime(order.createdAt)],
        ['決済完了日時', order.paidAt ? fmtDateTime(order.paidAt) : '—'],
      ];

      setHtml('#resultBody', rows.map(([k, v]) =>
        `<tr><th class="text-muted fw-normal" style="width:40%">${esc(k)}</th><td>${v}</td></tr>`
      ).join(''));
      show('#resultArea');
    } catch (err) {
      if (err.code === 'NOT_FOUND') {
        setHtml('#formError', '注文が見つかりませんでした。メールアドレスと注文番号をご確認ください。');
      } else {
        setHtml('#formError', esc(err.message));
      }
      show('#formError');
    }

    btn.disabled = false;
    btn.textContent = '照会する';
  });
})();
</script>
</body>
</html>
