<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>決済キャンセル — はなたば</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>

<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">はなたば</a>
    <a href="order-inquiry.html" class="text-white small">注文照会</a>
  </div>
</nav>

<main class="container py-5" style="max-width:600px;margin:auto">

  <div class="text-center">
    <div style="font-size:5rem">⚠️</div>
    <h2 class="fw-bold mt-3">決済がキャンセルされました</h2>
    <p class="lead text-muted">お支払いは完了していません。</p>
  </div>

  <div class="card p-4 my-4">
    <div id="detailArea">
      <p class="small text-muted mb-0">
        決済画面でキャンセルされたか、エラーが発生しました。<br>
        もう一度お試しいただくか、別のお支払い方法をご利用ください。
      </p>
    </div>
    <div id="errorDetail" class="d-none mt-3">
      <hr>
      <p class="small text-muted mb-1">エラー情報</p>
      <p class="small font-monospace mb-0" id="errorCode"></p>
    </div>
  </div>

  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a id="retryLink" href="index.html" class="btn-gift text-decoration-none px-4 py-2">
      イベント一覧へ戻る
    </a>
    <a href="order-inquiry.html" class="btn btn-outline-secondary">
      注文照会
    </a>
  </div>

</main>

<footer class="border-top py-4 mt-5">
  <div class="container text-center text-muted small">&copy; 2026 はなたば.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script>
(() => {
  // GMO コールバックパラメータ ?p= のデコード
  function decodeGmoCallbackParam(str) {
    try {
      const base64 = str
        .replace(/-/g, '+')
        .replace(/_/g, '/')
        .padEnd(str.length + (4 - str.length % 4) % 4, '=');
      return JSON.parse(atob(base64));
    } catch (e) { return null; }
  }

  const pParam  = qs.get('p');
  const eventId = qs.get('eventId');

  // ?p= からエラー情報を取得
  if (pParam) {
    const data = decodeGmoCallbackParam(pParam);
    if (data && (data.errCode || data.errInfo)) {
      setText('#errorCode', (data.errCode || '') + ' ' + (data.errInfo || ''));
      show('#errorDetail');
    }
  }

  // イベントIDがあればイベント詳細へのリンクを設定
  if (eventId) {
    const link = document.getElementById('retryLink');
    link.href = 'event-detail.html?id=' + encodeURIComponent(eventId);
    link.textContent = 'イベントに戻る';
  }
})();
</script>
</body>
</html>
