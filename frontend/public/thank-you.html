      透 豎ｺ貂亥ｮ御ｺ・ｾ後√＃逋ｻ骭ｲ縺ｮ繝｡繝ｼ繝ｫ繧｢繝峨Ξ繧ｹ縺ｸ遒ｺ隱阪Γ繝ｼ繝ｫ繧偵♀騾√ｊ縺励∪縺吶・br>

  <!-- 豕ｨ譁・せ繝・・繧ｿ繧ｹ・医・繝ｼ繝ｪ繝ｳ繧ｰ縺ｧ遒ｺ隱搾ｼ・-->

    <a href="index.html" class="btn-gift text-decoration-none px-4 py-2">繧､繝吶Φ繝井ｸ隕ｧ縺ｸ謌ｻ繧・/a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(async () => {
  const gmoOrderId = qs.get('gmoOrderId') || qs.get('OrderID');
  if (!gmoOrderId) { location.href = 'index.html'; return; }

  setText('#orderIdText', gmoOrderId);

  // 豕ｨ譁・・莨壹Μ繝ｳ繧ｯ縺ｫ繝｡繝ｼ繝ｫ縺悟ｿ・ｦ√↑縺溘ａ縲《essionStorage縺九ｉ繝｡繝ｼ繝ｫ繧貞叙蠕・  const savedEmail = store.get('last_buyer_email');
  if (savedEmail) {
    $('#inquiryLink').href = `order-inquiry.html?gmoOrderId=${encodeURIComponent(gmoOrderId)}&email=${encodeURIComponent(savedEmail)}`;
  }

  // 豕ｨ譁・せ繝・・繧ｿ繧ｹ繧堤｢ｺ隱搾ｼ・0遘貞ｾ後↓1蝗橸ｼ・  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  if (savedEmail) {
    setTimeout(async () => {
      try {
        const order = await api.public.inquireOrder(gmoOrderId, savedEmail);
        if (order.paymentStatus === 'PAID') {
          setHtml('#statusArea', `
            <div class="alert alert-success">
              笨・<strong>豎ｺ貂医′遒ｺ隱阪＆繧後∪縺励◆縲・/strong>
              蟾ｮ縺怜・繧後・貅門ｙ繧偵＠縺ｦ縺・∪縺吶・            </div>`);
        } else if (order.paymentStatus === 'CANCELED') {
          setHtml('#statusArea', `
            <div class="alert alert-warning">
              笞・・豎ｺ貂医′繧ｭ繝｣繝ｳ繧ｻ繝ｫ縺輔ｌ縺ｾ縺励◆縲ゅｂ縺・ｸ蠎ｦ縺願ｩｦ縺励￥縺縺輔＞縲・            </div>`);
        }
      } catch (_) {
        // 辣ｧ莨壼､ｱ謨励・辟｡隕・      }
    }, 10000);
  }

  // 繧ｻ繝・す繝ｧ繝ｳ縺九ｉ繝｡繝ｼ繝ｫ繧貞炎髯､・・蝗槭□縺台ｽｿ逕ｨ・・  store.del('last_buyer_email');
})();
</script>
