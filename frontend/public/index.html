<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🌸 はなたば ― 大切な人へ花の差し入れを</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
  <meta name="description" content="コンサート・ライブ・発表会の出演者へ。住所不要で花を贈れます。">
</head>
<body>

<!-- ナビゲーション -->
<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">🌸 はなたば</a>
    <a href="order-inquiry.html" class="text-white small">注文照会</a>
  </div>
</nav>

<!-- ヒーロー -->
<div class="hero">
  <div class="container">
    <h1>🌸 大切な人へ、花の差し入れを</h1>
    <p class="lead">コンサート・ライブ・発表会の出演者へ。住所不要でお届けします。</p>
  </div>
</div>

<!-- 検索バー -->
<div class="bg-white border-bottom py-3">
  <div class="container">
    <div class="row g-2 align-items-center">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0">🔍</span>
          <input type="text" id="searchInput" class="form-control border-start-0" placeholder="イベント名・会場名で検索">
        </div>
      </div>
      <div class="col-md-3">
        <select id="prefFilter" class="form-select">
          <option value="">都道府県（すべて）</option>
        </select>
      </div>
      <div class="col-md-3">
        <select id="statusFilter" class="form-select">
          <option value="">すべて</option>
          <option value="open">受付中のみ</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- イベント一覧 -->
<main class="container py-5">
  <div id="eventGrid" class="row g-4">
    <div class="col-12 loading-spinner">
      <span class="spinner-border spinner-border-sm me-2"></span>読み込み中...
    </div>
  </div>
</main>

<footer class="border-top py-4 mt-4">
  <div class="container text-center text-muted small">
    &copy; 2026 はなたば. All rights reserved.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(async () => {
  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  let allEvents = [];

  // イベント一覧取得
  try {
    allEvents = await api.public.listEvents();
  } catch (e) {
    setHtml('#eventGrid', `<div class="col-12"><div class="error-banner">イベントの読み込みに失敗しました: ${esc(e.message)}</div></div>`);
    return;
  }

  // 都道府県フィルタ選択肢を生成
  const prefs = [...new Set(allEvents.map(e => e.venuePref).filter(Boolean))].sort();
  if (prefs.length) {
    const sel = document.getElementById('prefFilter');
    prefs.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });
  }

  function renderGrid() {
    const q       = document.getElementById('searchInput').value.toLowerCase();
    const pref    = document.getElementById('prefFilter').value;
    const onlyOpen = document.getElementById('statusFilter').value === 'open';

    const filtered = allEvents.filter(ev => {
      if (q && !(ev.title||'').toLowerCase().includes(q) && !(ev.venueName||'').toLowerCase().includes(q)) return false;
      if (pref && ev.venuePref !== pref) return false;
      if (onlyOpen && !ev.isGiftOpen) return false;
      return true;
    });

    if (!filtered.length) {
      setHtml('#eventGrid', '<div class="col-12"><div class="empty-state">🌸<br>条件に合うイベントが見つかりません</div></div>');
      return;
    }

    const html = filtered.map(ev => {
      const badge = ev.isGiftOpen
        ? '<span class="badge bg-danger">🌸 受付中</span>'
        : '<span class="badge bg-secondary">受付終了</span>';

      const cover = ev.coverImageUrl
        ? `<img src="${esc(ev.coverImageUrl)}" class="card-img-top" style="height:200px;object-fit:cover" alt="">`
        : `<div style="height:160px;background:linear-gradient(135deg,#c0392b,#922b21);display:flex;align-items:center;justify-content:center"><span style="font-size:3.5rem">🌸</span></div>`;

      const dateStr = ev.firstSessionAt ? fmtDate(ev.firstSessionAt) : (ev.giftDeadlineAt ? '締切: ' + fmtDate(ev.giftDeadlineAt) : '');

      const performers = (ev.performers || []).slice(0, 3).map(p => esc(p.displayName)).join(' / ');

      return `
        <div class="col-md-6 col-lg-4">
          <div class="card event-card h-100">
            ${cover}
            <div class="card-body">
              <div class="mb-2">${badge}</div>
              <h5 class="card-title fw-bold">${esc(ev.title)}</h5>
              ${dateStr ? `<p class="text-muted small mb-1">📅 ${esc(dateStr)}</p>` : ''}
              <p class="text-muted small mb-1">📍 ${esc(ev.venueName)}${ev.venuePref ? `（${esc(ev.venuePref)}）` : ''}</p>
              ${performers ? `<p class="small mb-0">🎤 ${performers}</p>` : ''}
            </div>
            <div class="card-footer bg-white border-0 pb-3">
              <a href="event-detail.html?id=${esc(ev.eventId)}" class="btn-gift d-block text-center">
                詳細を見る →
              </a>
            </div>
          </div>
        </div>`;
    }).join('');

    setHtml('#eventGrid', html);
  }

  renderGrid();

  // フィルタリング
  document.getElementById('searchInput').addEventListener('input', renderGrid);
  document.getElementById('prefFilter').addEventListener('change', renderGrid);
  document.getElementById('statusFilter').addEventListener('change', renderGrid);
})();
</script>
</body>
</html>
