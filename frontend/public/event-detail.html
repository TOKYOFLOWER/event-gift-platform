<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>繧､繝吶Φ繝郁ｩｳ邏ｰ 窶・縺ｯ縺ｪ縺溘・</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>

<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">減 縺ｯ縺ｪ縺溘・</a>
    <a href="order-inquiry.html" class="text-white small">豕ｨ譁・・莨・/a>
  </div>
</nav>

<main id="pageContent">
  <div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span>隱ｭ縺ｿ霎ｼ縺ｿ荳ｭ...</div>
</main>

<footer class="border-top py-4 mt-5">
  <div class="container text-center text-muted small">&copy; 2026 縺ｯ縺ｪ縺溘・.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(async () => {
  const eventId = qs.get('id');
  if (!eventId) { location.href = 'index.html'; return; }

  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  let result;
  try {
    result = await api.public.getEvent(eventId);
  } catch (e) {
    setHtml('#pageContent', `<div class="container py-5"><div class="error-banner">${esc(e.message)}</div></div>`);
    return;
  }

  const { event: ev, sessions, ticketTypes, performers, publicMessages } = result;

  // 繝壹・繧ｸ繧ｿ繧､繝医Ν
  document.title = ev.title + ' 窶・縺ｯ縺ｪ縺溘・';

  // 邱蛻・ヰ繝翫・
  let deadlineBanner = '';
  if (ev.giftDeadlineAt) {
    deadlineBanner = ev.isGiftOpen
      ? `<div class="alert alert-warning">竢ｰ <strong>蟾ｮ縺怜・繧悟女莉倡ｷ蛻・</strong> ${fmtDateTime(ev.giftDeadlineAt)}</div>`
      : `<div class="alert alert-secondary">蟾ｮ縺怜・繧後・蜿嶺ｻ倥・邨ゆｺ・＠縺ｾ縺励◆縲・/div>`;
  }

  // 繧ｻ繝・す繝ｧ繝ｳ荳隕ｧ
  const sessionsHtml = sessions.length ? sessions.map(s => `
    <div class="d-flex gap-3 align-items-start mb-2">
      <span style="font-size:1.2rem">鎖</span>
      <div>
        <strong>${esc(s.sessionLabel)}</strong><br>
        <span class="text-muted small">
          ${s.doorsAt ? 'open ' + fmtTime(s.doorsAt) + ' / ' : ''}
          start ${fmtTime(s.startAt)}
          ${s.endAt ? ' / close ' + fmtTime(s.endAt) : ''}
        </span>
      </div>
    </div>`).join('') : '';

  // 蛻ｸ遞ｮ荳隕ｧ
  const ticketsHtml = ticketTypes.length ? `
    <ul class="list-group mb-3">
      ${ticketTypes.map(t => `
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <strong>${esc(t.label)}</strong>
            ${t.description ? `<br><small class="text-muted">${esc(t.description)}</small>` : ''}
            ${t.conditions   ? `<br><small class="text-danger">${esc(t.conditions)}</small>` : ''}
          </div>
          <span class="fw-bold">${fmtJPY(t.priceJPY)}</span>
        </li>`).join('')}
    </ul>` : '';

  // 莨壼ｴ諠・ｱ
  const mapQ = encodeURIComponent([ev.venueName, ev.venuePref, ev.venueCity, ev.venueAddress].filter(Boolean).join(' '));
  const venueHtml = `
    <p class="mb-1"><strong>${esc(ev.venueName)}</strong></p>
    ${ev.venuePostalCode ? `<p class="small text-muted mb-0">縲・{esc(ev.venuePostalCode)}</p>` : ''}
    <p class="small text-muted mb-1">${[ev.venuePref, ev.venueCity, ev.venueAddress].filter(Boolean).map(esc).join('')}</p>
    ${ev.venueAccess ? `<p class="small">噬 ${esc(ev.venueAccess)}</p>` : ''}
    <a href="https://maps.google.com/?q=${mapQ}" target="_blank" rel="noopener" class="btn btn-outline-secondary btn-sm">Google Maps 縺ｧ隕九ｋ</a>`;

  // 蜃ｺ貍碑・き繝ｼ繝・  const performersHtml = performers.map(p => {
    const avatar = p.avatarUrl
      ? `<img src="${esc(p.avatarUrl)}" class="performer-avatar" alt="${esc(p.displayName)}">`
      : `<div class="performer-avatar-placeholder">痔</div>`;

    let giftBtn = '';
    if (p.isGiftEnabled) {
      giftBtn = ev.isGiftOpen
        ? `<a href="gift-products.html?eventId=${esc(eventId)}&performerId=${esc(p.performerId)}" class="btn-gift d-inline-block mt-2 px-3 py-2" style="font-size:.85rem">減 蟾ｮ縺怜・繧後ｒ雍医ｋ</a>`
        : `<span class="badge bg-secondary mt-2">蜿嶺ｻ倡ｵゆｺ・/span>`;
    }

    return `
      <div class="col-6 col-md-4 col-lg-3">
        <div class="performer-card">
          ${avatar}
          <p class="fw-bold mb-0 mt-2">${esc(p.displayName)}</p>
          ${p.titleOrGroup ? `<p class="text-muted small mb-1">${esc(p.titleOrGroup)}</p>` : ''}
          ${p.snsUrl ? `<a href="${esc(p.snsUrl)}" target="_blank" rel="noopener" class="small text-muted">SNS 竊・/a>` : ''}
          <div>${giftBtn}</div>
        </div>
      </div>`;
  }).join('');

  // 蠢懈抄繝｡繝・そ繝ｼ繧ｸ
  const messagesHtml = publicMessages.slice(0, 20).map(m => {
    const name = m.isAnonymous ? '蛹ｿ蜷・ : esc(m.buyerName || '蛹ｿ蜷・);
    return `
      <div class="border rounded p-3 mb-2">
        <p class="mb-1">${esc(m.message)}</p>
        <small class="text-muted">窶・${name}${m.performerName ? ` 竊・${esc(m.performerName)}` : ''}</small>
      </div>`;
  }).join('');

  // 繧ｫ繝舌・逕ｻ蜒・  const cover = ev.coverImageUrl
    ? `<div style="height:320px;overflow:hidden"><img src="${esc(ev.coverImageUrl)}" class="w-100 h-100" style="object-fit:cover" alt="${esc(ev.title)}"></div>`
    : `<div style="height:200px;background:linear-gradient(135deg,#c0392b,#922b21);display:flex;align-items:center;justify-content:center"><span style="font-size:5rem">減</span></div>`;

  setHtml('#pageContent', `
    ${cover}
    <div class="container py-4">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a href="index.html">繧､繝吶Φ繝井ｸ隕ｧ</a></li>
          <li class="breadcrumb-item active">${esc(ev.title)}</li>
        </ol>
      </nav>

      <div class="row">
        <div class="col-lg-8">
          <h1 class="fw-bold">${esc(ev.title)}</h1>
          ${(ev.genre || ev.category) ? `<p class="text-muted">${[ev.genre, ev.category].filter(Boolean).map(esc).join(' / ')}</p>` : ''}

          ${sessions.length ? `<h5 class="fw-bold mt-4">套 蜈ｬ貍疲律譎・/h5>${sessionsHtml}` : ''}
          ${ticketTypes.length ? `<h5 class="fw-bold mt-4">辞 繝√こ繝・ヨ譁咎≡</h5>${ticketsHtml}` : ''}
          ${ev.ticketUrl ? `<a href="${esc(ev.ticketUrl)}" target="_blank" rel="noopener" class="btn btn-outline-danger mb-3">繝√こ繝・ヨ雉ｼ蜈･繧ｵ繧､繝医∈ 竊・/a>` : ''}
          ${ev.eventNotes ? `<h5 class="fw-bold mt-4">統 蛯呵・/h5><p class="text-muted" style="white-space:pre-line">${esc(ev.eventNotes)}</p>` : ''}
          ${ev.description ? `<p style="white-space:pre-line">${esc(ev.description)}</p>` : ''}
        </div>

        <div class="col-lg-4 mt-4 mt-lg-0">
          <div class="card p-3 mb-3">
            <h6 class="fw-bold">桃 莨壼ｴ諠・ｱ</h6>
            ${venueHtml}
          </div>
          ${ev.contactInfo ? `<div class="card p-3"><h6 class="fw-bold">透 縺雁撫縺・粋繧上○</h6><p class="small mb-0">${esc(ev.contactInfo)}</p></div>` : ''}
        </div>
      </div>

      <h4 class="fw-bold mt-5">減 蟾ｮ縺怜・繧後ｒ雍医ｋ</h4>
      ${deadlineBanner}
      ${performers.length
        ? `<div class="row g-3">${performersHtml}</div>`
        : '<p class="text-muted">蜃ｺ貍碑・ュ蝣ｱ縺ｯ貅門ｙ荳ｭ縺ｧ縺吶・/p>'}

      ${publicMessages.length ? `
        <h5 class="fw-bold mt-5">町 蠢懈抄繝｡繝・そ繝ｼ繧ｸ</h5>
        ${messagesHtml}` : ''}
    </div>`);
})();
</script>
</body>
</html>
