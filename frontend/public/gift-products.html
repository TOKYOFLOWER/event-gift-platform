<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蝠・刀繧帝∈縺ｶ 窶・縺ｯ縺ｪ縺溘・</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../shared/css/style.css">
</head>
<body>

<nav class="pub-nav">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="index.html" class="brand">減 縺ｯ縺ｪ縺溘・</a>
    <a href="order-inquiry.html" class="text-white small">豕ｨ譁・・莨・/a>
  </div>
</nav>

<main id="pageContent">
  <div class="loading-spinner"><span class="spinner-border spinner-border-sm me-2"></span>隱ｭ縺ｿ霎ｼ縺ｿ荳ｭ...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="../shared/js/api.js"></script>
<script>
(async () => {
  const eventId     = qs.get('eventId');
  const performerId = qs.get('performerId');

  if (!eventId || !performerId) { location.href = 'index.html'; return; }

  const cfg = getConfig();
  const api = new GasApi({ publicUrl: cfg.publicUrl, adminUrl: cfg.adminUrl });

  let evResult, products;
  try {
    [evResult, products] = await Promise.all([
      api.public.getEvent(eventId),
      api.public.listProducts({ eventId, category: 'FLOWER' })
    ]);
  } catch (e) {
    setHtml('#pageContent', `<div class="container py-5"><div class="error-banner">${esc(e.message)}</div></div>`);
    return;
  }

  const { event: ev, performers } = evResult;
  const performer = performers.find(p => p.performerId === performerId);

  if (!performer) {
    setHtml('#pageContent', `<div class="container py-5"><div class="error-banner">蜃ｺ貍碑・′隕九▽縺九ｊ縺ｾ縺帙ｓ縲・/div></div>`);
    return;
  }

  // 蝠・刀繧ｫ繝ｼ繝・  let selectedProductId = null;

  const cardsHtml = products.map(p => `
    <div class="col-6 col-md-4">
      <label class="product-card d-block h-100 p-3" data-product-id="${esc(p.productId)}" onclick="selectProduct('${esc(p.productId)}')">
        ${p.imageUrl
          ? `<img src="${esc(p.imageUrl)}" class="product-img mb-2" alt="${esc(p.name)}">`
          : `<div class="product-img-placeholder mb-2">減</div>`}
        <p class="fw-bold mb-0">${esc(p.name)}</p>
        <p class="text-danger fw-bold mb-0">${fmtJPY(p.priceJPY)}</p>
        ${p.description ? `<p class="small text-muted mb-0">${esc(p.description)}</p>` : ''}
      </label>
    </div>`).join('');

  const avatar = performer.avatarUrl
    ? `<img src="${esc(performer.avatarUrl)}" class="performer-avatar" style="width:56px;height:56px" alt="${esc(performer.displayName)}">`
    : `<div class="performer-avatar-placeholder" style="width:56px;height:56px;font-size:1.5rem">痔</div>`;

  setHtml('#pageContent', `
    <div class="container py-4" style="max-width:900px">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a href="index.html">TOP</a></li>
          <li class="breadcrumb-item"><a href="event-detail.html?id=${esc(eventId)}">${esc(ev.title)}</a></li>
          <li class="breadcrumb-item active">蝠・刀驕ｸ謚・/li>
        </ol>
      </nav>

      <div class="d-flex align-items-center gap-3 mb-4">
        ${avatar}
        <div>
          <h2 class="fw-bold mb-0">${esc(performer.displayName)}</h2>
          <p class="text-muted small mb-0">${esc(ev.title)} 縺ｸ縺ｮ蟾ｮ縺怜・繧・/p>
        </div>
      </div>

      <h4 class="fw-bold mb-3">減 蝠・刀繧帝∈縺ｶ</h4>

      ${products.length ? `
        <div class="row g-3 mb-4">${cardsHtml}</div>

        <div id="selectedInfo" class="alert alert-success d-none" style="border-left:4px solid #28a745">
          驕ｸ謚樔ｸｭ: <strong id="selectedName"></strong> 窶・<strong id="selectedPrice"></strong>
        </div>

        <div class="d-grid mt-3">
          <button id="nextBtn" class="btn-gift btn-lg py-3 text-center" disabled onclick="goNext()">
            谺｡縺ｸ・壹Γ繝・そ繝ｼ繧ｸ繧貞・蜉・竊・          </button>
        </div>
      ` : '<p class="text-muted">迴ｾ蝨ｨ蜿悶ｊ謇ｱ縺・膚蜩√′縺ゅｊ縺ｾ縺帙ｓ縲・/p>'}
    </div>`);

  // 蝠・刀驕ｸ謚槭Ο繧ｸ繝・け・医げ繝ｭ繝ｼ繝舌Ν髢｢謨ｰ縺ｨ縺励※螳夂ｾｩ・・  const productsData = Object.fromEntries(products.map(p => [p.productId, p]));

  window.selectProduct = (productId) => {
    selectedProductId = productId;
    const p = productsData[productId];
    if (!p) return;

    // 繧ｹ繧ｿ繧､繝ｫ譖ｴ譁ｰ
    $$('.product-card').forEach(el => el.classList.remove('selected'));
    const card = $(`[data-product-id="${productId}"]`);
    if (card) card.classList.add('selected');

    // 驕ｸ謚樊ュ蝣ｱ陦ｨ遉ｺ
    setText('#selectedName', p.name);
    setText('#selectedPrice', fmtJPY(p.priceJPY));
    show('#selectedInfo');

    const btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = false;
  };

  window.goNext = () => {
    if (!selectedProductId) return;
    location.href = `gift-checkout.html?eventId=${encodeURIComponent(eventId)}&performerId=${encodeURIComponent(performerId)}&productId=${encodeURIComponent(selectedProductId)}`;
  };
})();
</script>
</body>
</html>
